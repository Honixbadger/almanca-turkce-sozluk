<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tasarım 2 — DWDS Akademik</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg: #faf8f4;
  --surface: #ffffff;
  --border: #e4ddd2;
  --ink: #16130e;
  --ink-muted: #6b6055;
  --brand: #8b1a1a;
  --brand-light: #fdf4f4;
  --accent: #c5a028;
  --tag-bg: #f2ede5;
  --radius: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Source Serif 4', Georgia, serif; background: var(--bg); color: var(--ink); line-height: 1.7; }

/* HEADER */
.site-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; }
.header-inner { max-width: 1000px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
.site-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--brand); letter-spacing: -0.01em; white-space: nowrap; }
.site-name small { font-size: 0.7rem; font-family: 'Inter', sans-serif; display: block; color: var(--ink-muted); font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 2px; }
.search-form { flex: 1; display: flex; max-width: 560px; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; background: #fff; }
.search-form input { flex: 1; padding: 10px 16px; border: none; font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--ink); outline: none; }
.search-form button { padding: 10px 18px; background: var(--brand); color: #fff; border: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; letter-spacing: 0.03em; }
.filter-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 7px 16px; font-family: 'Inter', sans-serif; font-size: 0.8rem; border: none; background: none; cursor: pointer; color: var(--ink-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab-btn.active, .tab-btn:hover { color: var(--brand); border-bottom-color: var(--brand); }

/* LAYOUT */
.layout { max-width: 1000px; margin: 0 auto; padding: 28px 24px 60px; display: grid; grid-template-columns: 220px 1fr; gap: 32px; }

/* SIDEBAR */
.sidebar { }
.sidebar-section { margin-bottom: 24px; }
.sidebar-heading { font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 12px; }
.sidebar-link { display: block; font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--ink); text-decoration: none; padding: 5px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s; }
.sidebar-link:hover { background: var(--tag-bg); }
.sidebar-link.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
.sidebar-link-tr { float: right; color: var(--ink-muted); font-size: 0.8rem; }
.result-count { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 12px; }

/* ENTRY ARTICLE */
.entry-article { }
.entry-head-block { border-bottom: 2px solid var(--brand); padding-bottom: 16px; margin-bottom: 24px; }
.entry-meta-line { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.meta-pos { background: var(--brand); color: #fff; padding: 2px 8px; border-radius: 2px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.meta-artikel { color: var(--brand); font-weight: 600; }
.meta-cat { background: var(--tag-bg); padding: 2px 8px; border-radius: 2px; color: var(--ink-muted); }
.entry-lemma { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--ink); line-height: 1; }
.entry-lemma-info { margin-top: 8px; font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--ink-muted); }

.entry-translation-block { margin: 0 0 28px; padding: 16px 20px; background: var(--brand-light); border-left: 4px solid var(--brand); }
.tr-label { font-family: 'Inter', sans-serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand); font-weight: 700; margin-bottom: 6px; }
.tr-word { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--brand); }
.tr-desc { margin-top: 8px; font-size: 0.95rem; color: var(--ink-muted); font-style: italic; }

.section-head { font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* EXAMPLES */
.examples-section { margin-bottom: 32px; }
.example-block { margin-bottom: 16px; display: grid; grid-template-columns: 3px 1fr; gap: 0 16px; }
.example-bar { background: var(--accent); border-radius: 2px; }
.example-content { }
.example-de-text { font-size: 1.05rem; color: var(--ink); font-style: italic; line-height: 1.6; }
.example-de-text mark { background: rgba(139,26,26,0.1); padding: 0 3px; border-radius: 2px; font-style: normal; color: var(--brand); }
.example-tr-text { font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--ink-muted); margin-top: 5px; padding-left: 14px; border-left: none; }

/* GRAMMAR */
.grammar-section { margin-bottom: 32px; }
.grammar-table { border-collapse: collapse; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
.grammar-table th { text-align: left; color: var(--ink-muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
.grammar-table td { padding: 9px 12px; border-bottom: 1px solid rgba(228,221,210,0.5); font-family: 'Source Serif 4', serif; }
.grammar-table tr:last-child td { border-bottom: none; }

/* SYNONYMS */
.synonym-section { margin-bottom: 28px; }
.syn-list { display: flex; flex-wrap: wrap; gap: 8px; }
.syn-word { font-family: 'Inter', sans-serif; font-size: 0.88rem; padding: 5px 12px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; transition: all 0.14s; }
.syn-word:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-name">Almanca-Türkçe Sözlük <small>Akademik Baskı</small></div>
    <form class="search-form" onsubmit="doSearch(event)">
      <input type="search" id="search-input" placeholder="Kelime ara…" oninput="liveFilter(this.value)">
      <button type="submit">Ara</button>
    </form>
  </div>
  <div style="max-width:1000px;margin:0 auto;padding:0 24px">
    <div class="filter-tabs">
      <button class="tab-btn active" onclick="setTab('','Tümü',this)">Tümü</button>
      <button class="tab-btn" onclick="setTab('isim','İsim',this)">İsim</button>
      <button class="tab-btn" onclick="setTab('fiil','Fiil',this)">Fiil</button>
      <button class="tab-btn" onclick="setTab('sıfat','Sıfat',this)">Sıfat</button>
      <button class="tab-btn" onclick="setTab('zarf','Zarf',this)">Zarf</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading" id="result-label">10 Sonuç</div>
      <div id="sidebar-list"></div>
    </div>
  </aside>

  <main id="main-content">
    <div id="entry-display"></div>
  </main>
</div>

<script>
const ENTRIES = [
  { almanca:"Fahrrad", artikel:"das", turkce:"bisiklet", tur:"isim", cogul:"Fahrräder", genitiv:"Fahrrads", kategoriler:["ulaşım"], anlam:"İki tekerlekli, pedallarla hareket ettirilen kişisel ulaşım aracı.", esanlamlilar:["Rad","Velo"], ornekler:[{almanca:"Ich fahre jeden Tag mit dem Fahrrad zur Schule.",turkce:"Her gün bisikletle okula gidiyorum."},{almanca:"Das Fahrrad ist umgefallen.",turkce:"Bisiklet devrildi."}]},
  { almanca:"schön", turkce:"güzel", tur:"sıfat", komparativ:"schöner", superlativ:"am schönsten", kategoriler:["günlük hayat"], anlam:"Estetik açıdan hoş olan, göze hitap eden.", esanlamlilar:["hübsch","wunderschön"], ornekler:[{almanca:"Das Wetter ist heute sehr schön.",turkce:"Hava bugün çok güzel."},{almanca:"Sie hat ein schönes Kleid an.",turkce:"Üzerinde güzel bir elbise var."},{almanca:"Der Blick vom Berg ist wunderschön.",turkce:"Dağdan manzara muhteşem."}]},
  { almanca:"fahren", turkce:"sürmek, gitmek", tur:"fiil", partizip2:"gefahren", kategoriler:["ulaşım","günlük hayat"], anlam:"Bir araç kullanarak bir yerden bir yere gitmek.", esanlamlilar:["reisen","lenken"], ornekler:[{almanca:"Wir fahren morgen nach Berlin.",turkce:"Yarın Berlin'e gidiyoruz."},{almanca:"Er fährt gern Auto.",turkce:"Araba sürmekten hoşlanır."}]},
  { almanca:"Freundschaft", artikel:"die", turkce:"dostluk, arkadaşlık", tur:"isim", cogul:"Freundschaften", kategoriler:["sosyal hayat"], anlam:"Karşılıklı sevgi, güven ve saygıya dayalı kişiler arası bağ.", esanlamlilar:["Kameradschaft","Verbundenheit"], ornekler:[{almanca:"Unsere Freundschaft hält seit zwanzig Jahren.",turkce:"Dostluğumuz yirmi yıldır devam ediyor."},{almanca:"Wahre Freundschaft ist selten.",turkce:"Gerçek dostluk nadirdir."}]},
  { almanca:"Fenster", artikel:"das", turkce:"pencere", tur:"isim", cogul:"Fenster", genitiv:"Fensters", anlam:"Bir yapının duvarında ışık ve hava geçişine yarayan açıklık.", ornekler:[{almanca:"Bitte mach das Fenster zu!",turkce:"Lütfen pencereyi kapat!"},{almanca:"Durch das Fenster sehe ich den Garten.",turkce:"Pencereden bahçeyi görüyorum."}]},
  { almanca:"arbeiten", turkce:"çalışmak", tur:"fiil", partizip2:"gearbeitet", kategoriler:["meslek","günlük hayat"], anlam:"Bir amaç doğrultusunda fiziksel ya da zihinsel çaba harcamak.", esanlamlilar:["tätig sein","werken"], ornekler:[{almanca:"Sie arbeitet als Ärztin in einem Krankenhaus.",turkce:"Bir hastanede doktor olarak çalışıyor."},{almanca:"Ich arbeite jeden Tag von neun bis fünf.",turkce:"Her gün dokuzdan beşe kadar çalışıyorum."},{almanca:"Hast du heute viel gearbeitet?",turkce:"Bugün çok çalıştın mı?"}]},
  { almanca:"Bahnhof", artikel:"der", turkce:"istasyon, tren garı", tur:"isim", cogul:"Bahnhöfe", genitiv:"Bahnhofs", kategoriler:["ulaşım"], anlam:"Trenlerin yolcu indirip bindirdiği bina ve çevresindeki alan.", ornekler:[{almanca:"Wir treffen uns am Bahnhof um drei Uhr.",turkce:"Saat üçte istasyonda buluşuyoruz."},{almanca:"Der Bahnhof ist sehr groß.",turkce:"İstasyon çok büyük."}]},
  { almanca:"schnell", turkce:"hızlı, çabuk", tur:"sıfat", komparativ:"schneller", superlativ:"am schnellsten", kategoriler:["günlük hayat"], anlam:"Az zaman alan, yüksek hızda gerçekleşen.", esanlamlilar:["rasch","flott"], ornekler:[{almanca:"Das Auto fährt sehr schnell.",turkce:"Araba çok hızlı gidiyor."},{almanca:"Kannst du bitte schneller kommen?",turkce:"Lütfen daha hızlı gelebilir misin?"}]},
  { almanca:"Wasser", artikel:"das", turkce:"su", tur:"isim", kategoriler:["doğa","günlük hayat"], anlam:"Renksiz, kokusuz, tatsız olan temel sıvı element.", ornekler:[{almanca:"Kannst du mir ein Glas Wasser geben?",turkce:"Bana bir bardak su verir misin?"},{almanca:"Das Wasser im Fluss ist klar.",turkce:"Nehirdeki su berrak."}]},
  { almanca:"lesen", turkce:"okumak", tur:"fiil", partizip2:"gelesen", kategoriler:["eğitim","kültür"], anlam:"Yazılı metni gözle izleyerek anlamak.", esanlamlilar:["studieren"], ornekler:[{almanca:"Er liest jeden Abend ein Buch.",turkce:"Her akşam bir kitap okur."},{almanca:"Ich lese gerade einen Roman auf Deutsch.",turkce:"Şu an Almanca bir roman okuyorum."}]},
];

let filtered = [...ENTRIES];
let activePOS = '';

function hl(text, word) {
  if (!word || word.length < 2) return text;
  return text.replace(new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
}

function renderSidebar() {
  document.getElementById('result-label').textContent = filtered.length + ' sonuç';
  document.getElementById('sidebar-list').innerHTML = filtered.map((e,i) =>
    `<div class="sidebar-link" onclick="showEntry(${i})" id="sl-${i}">
      ${e.almanca}
      <span class="sidebar-link-tr">${e.turkce.split(',')[0].trim()}</span>
    </div>`
  ).join('');
}

function showEntry(i) {
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  const sl = document.getElementById('sl-' + i);
  if (sl) sl.classList.add('active');
  const e = filtered[i];
  const q = document.getElementById('search-input').value.trim();
  let grammar = [];
  if (e.cogul) grammar.push(['Çoğul', e.cogul]);
  if (e.genitiv) grammar.push(['Genitiv', e.genitiv]);
  if (e.partizip2) grammar.push(['Partizip II', e.partizip2]);
  if (e.komparativ) grammar.push(['Karşılaştırma', e.komparativ]);
  if (e.superlativ) grammar.push(['Üstünlük', e.superlativ]);

  document.getElementById('entry-display').innerHTML = `
    <article class="entry-article">
      <div class="entry-head-block">
        <div class="entry-meta-line">
          <span class="meta-pos">${e.tur}</span>
          ${e.artikel ? `<span class="meta-artikel">${e.artikel}</span>` : ''}
          ${(e.kategoriler||[]).map(k=>`<span class="meta-cat">${k}</span>`).join('')}
        </div>
        <div class="entry-lemma">${hl(e.almanca, q)}</div>
        ${e.cogul||e.genitiv||e.partizip2||e.komparativ ? `<div class="entry-lemma-info">
          ${e.cogul?'çoğul: <strong>'+e.cogul+'</strong>':''}
          ${e.genitiv?' · genitiv: <strong>'+e.genitiv+'</strong>':''}
          ${e.partizip2?' · Partizip II: <strong>'+e.partizip2+'</strong>':''}
          ${e.komparativ?' · '+e.komparativ+' · '+e.superlativ:''}
        </div>` : ''}
      </div>

      <div class="entry-translation-block">
        <div class="tr-label">Türkçe Karşılık</div>
        <div class="tr-word">${e.turkce}</div>
        ${e.anlam ? `<div class="tr-desc">${e.anlam}</div>` : ''}
      </div>

      ${e.ornekler && e.ornekler.length ? `
      <div class="examples-section">
        <div class="section-head">Örnek Kullanımlar</div>
        ${e.ornekler.map(ex => `
          <div class="example-block">
            <div class="example-bar"></div>
            <div class="example-content">
              <div class="example-de-text">${hl(ex.almanca, e.almanca)}</div>
              <div class="example-tr-text">${ex.turkce||'<em>çeviri bekleniyor</em>'}</div>
            </div>
          </div>`).join('')}
      </div>` : ''}

      ${grammar.length ? `
      <div class="grammar-section">
        <div class="section-head">Dilbilgisi</div>
        <table class="grammar-table">
          <thead><tr><th>Kategori</th><th>Biçim</th></tr></thead>
          <tbody>${grammar.map(([l,v])=>`<tr><td>${l}</td><td>${v}</td></tr>`).join('')}</tbody>
        </table>
      </div>` : ''}

      ${e.esanlamlilar && e.esanlamlilar.length ? `
      <div class="synonym-section">
        <div class="section-head">Eş Anlamlılar</div>
        <div class="syn-list">${e.esanlamlilar.map(s=>`<span class="syn-word">${s}</span>`).join('')}</div>
      </div>` : ''}
    </article>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function liveFilter(q) {
  const ql = q.toLowerCase();
  filtered = ENTRIES.filter(e => {
    if (activePOS && e.tur !== activePOS) return false;
    if (!q) return true;
    return e.almanca.toLowerCase().includes(ql) || e.turkce.toLowerCase().includes(ql) || (e.anlam||'').toLowerCase().includes(ql);
  });
  renderSidebar();
}

function setTab(pos, label, btn) {
  activePOS = pos;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  liveFilter(document.getElementById('search-input').value);
}

function doSearch(e) { e.preventDefault(); }

renderSidebar();
showEntry(0);
</script>
</body>
</html>
